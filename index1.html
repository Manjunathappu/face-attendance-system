<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Employee Onboarding Portal</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
}

.container{
width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:4px;
}

button{
background:#3498db;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:4px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#2980b9;
}

.status{
margin-top:20px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<header>
<h2>Employee Digital Onboarding Portal</h2>
</header>

<div class="container">

<h3>New Hire Registration</h3>

<form id="employeeForm">

<input type="text" id="name" placeholder="Employee Name" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="text" id="department" placeholder="Department" required>

<input type="text" id="role" placeholder="Role" required>

<input type="text" id="manager" placeholder="Manager Name" required>

<label>Joining Date</label>
<input type="date" id="joiningDate" required>

<label>ID Proof</label>
<input type="file" id="idProof">

<label>Degree Certificate</label>
<input type="file" id="degreeCertificate">

<label>Signed Offer Letter</label>
<input type="file" id="offerLetter">

<button type="submit">Submit Onboarding Request</button>

</form>

<div class="status" id="statusMessage"></div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

const API_URL="https://2ugyiqqxof.execute-api.ap-south-1.amazonaws.com/prod/createEmployee";
const MAX_FILE_SIZE = 5 * 1024 * 1024; // 5MB

const form=document.getElementById("employeeForm");
const statusMessage=document.getElementById("statusMessage");

/* Convert file to Base64 */
function toBase64(file){
return new Promise((resolve,reject)=>{

const reader=new FileReader();

reader.readAsDataURL(file);

reader.onload=()=>resolve(reader.result.split(',')[1]);

reader.onerror=error=>reject(error);

});
}

/* Validate file size */
function validateFile(file, fileName){
if(file && file.size > MAX_FILE_SIZE){
statusMessage.style.color = "red";
statusMessage.innerText = `${fileName} is too large. Max allowed size is 5MB.`;
return false;
}
return true;
}

form.addEventListener("submit",async function(event){

event.preventDefault();

statusMessage.style.color="black";
statusMessage.innerText="Submitting onboarding request...";

const idProofFile=document.getElementById("idProof").files[0];
const degreeFile=document.getElementById("degreeCertificate").files[0];
const offerFile=document.getElementById("offerLetter").files[0];

/* 🚨 File size validation */
if(!validateFile(idProofFile, "ID Proof")) return;
if(!validateFile(degreeFile, "Degree Certificate")) return;
if(!validateFile(offerFile, "Offer Letter")) return;

/* Convert files if they exist */

let id_proof=null;
let degree_certificate=null;
let offer_letter=null;

try{

if(idProofFile){
id_proof=await toBase64(idProofFile);
}

if(degreeFile){
degree_certificate=await toBase64(degreeFile);
}

if(offerFile){
offer_letter=await toBase64(offerFile);
}

}catch(error){
statusMessage.style.color="red";
statusMessage.innerText="Error processing files.";
return;
}

/* Prepare request payload */

const data={

name:document.getElementById("name").value,
email:document.getElementById("email").value,
department:document.getElementById("department").value,
role:document.getElementById("role").value,
manager:document.getElementById("manager").value,
joining_date:document.getElementById("joiningDate").value,

id_proof:id_proof,
degree_certificate:degree_certificate,
offer_letter:offer_letter

};

try{

const response=await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

});

const result=await response.json();

if(response.ok){

statusMessage.style.color="green";
statusMessage.innerText="Onboarding request submitted successfully.";

form.reset();

}else{

statusMessage.style.color="red";
statusMessage.innerText="Error submitting request.";

}

}catch(error){

statusMessage.style.color="red";
statusMessage.innerText="Network error connecting to API.";

console.error(error);

}

});

});

</script>

</body>
</html>
