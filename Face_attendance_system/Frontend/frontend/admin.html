<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #111827;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: auto;
            margin-top: 20px;
        }

        /* 🔷 SUMMARY CARDS */
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin: 5px 0;
            color: #1f2937;
        }

        .card p {
            font-size: 20px;
            font-weight: bold;
        }

        .present { color: green; }
        .absent { color: red; }
        .late { color: orange; }

        /* 🔷 FILTERS */
        .filters {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input, select {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 15px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #059669;
        }

        /* 🔷 TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #1f2937;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f9fafb;
        }

    </style>
</head>

<body>

<header>
    <h1>Admin Attendance Dashboard</h1>
</header>

<div class="container">

    <!-- 📊 SUMMARY DASHBOARD -->
    <div class="summary">
        <div class="card">
            <h3>Total Employees</h3>
            <p id="total"></p>
        </div>
        <div class="card present">
            <h3>Present Today</h3>
            <p id="present"></p>
        </div>
        <div class="card absent">
            <h3>Absent Today</h3>
            <p id="absent"></p>
        </div>
        <div class="card late">
            <h3>Late</h3>
            <p id="late"></p>
        </div>
        <div class="card">
            <h3>Weekly Present %</h3>
            <p id="weeklyPresent"></p>
        </div>
        <div class="card">
            <h3>Weekly Late %</h3>
            <p id="weeklyLate"></p>
        </div>
        <div class="card">
            <h3>Weekly Absent %</h3>
            <p id="weeklyAbsent"></p>
        </div>
    </div>

    <!-- 🔍 FILTERS -->
    <div class="filters">
        <input type="text" id="name" placeholder="Employee Name">
        <input type="date" id="date">
        <select id="status">
            <option value="">All Status</option>
            <option value="Present">Present</option>
            <option value="Late">Late</option>
            <option value="Absent">Absent</option>
        </select>

        <button onclick="loadTable()">Filter</button>
    </div>

    <!-- 📋 TABLE -->
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Date</th>
                <th>Clock In</th>
                <th>Clock Out</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>
    </table>

</div>

<script>

// 🔗 Replace with your APIs

const SUMMARY_API = "https://uekuj1xqt6.execute-api.ap-south-1.amazonaws.com/summary";
const ATTENDANCE_API = "https://uekuj1xqt6.execute-api.ap-south-1.amazonaws.com/attendance";

// 📊 Load summary
async function loadSummary() {

    const res = await fetch(SUMMARY_API);
    const data = await res.json();

    document.getElementById("total").innerText = data.total;
    document.getElementById("present").innerText = data.present;
    document.getElementById("absent").innerText = data.absent;
    document.getElementById("late").innerText = data.late;

    document.getElementById("weeklyPresent").innerText = data.weeklyPresent + "%";
    document.getElementById("weeklyLate").innerText = data.weeklyLate + "%";
    document.getElementById("weeklyAbsent").innerText = data.weeklyAbsent + "%";
}


// 📋 Load table
async function loadTable() {

    const name = document.getElementById("name").value;
    const date = document.getElementById("date").value;
    const status = document.getElementById("status").value;

    const res = await fetch(`${ATTENDANCE_API}?name=${name}&date=${date}&status=${status}`);
    let data = await res.json();

    // --- 🟢 ADD SORTING LOGIC HERE ---
    data.sort((a, b) => {
        // Sort by Date (Newest first)
        if (a.date !== b.date) {
            return new Date(b.date) - new Date(a.date);
        }
        // If dates are the same, sort by Clock In time (Latest first)
        const timeA = a.clock_in || "00:00";
        const timeB = b.clock_in || "00:00";
        return timeB.localeCompare(timeA);
    });



    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    data.forEach(item => {
        table.innerHTML += `
            <tr>
                <td>${item.name}</td>
                <td>${item.date}</td>
                <td>${item.clock_in || "-"}</td>
                <td>${item.clock_out || "-"}</td>
                <td>${item.status}</td>
            </tr>
        `;
    });
}


// Load on start
loadSummary();
loadTable();




</script>

</body>
</html>
