<!DOCTYPE html>
<html>
<head>
<title>HR Onboarding Dashboard</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:40px;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:30px;
    background:white;
}

th,td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

th{
    background:#2c3e50;
    color:white;
}

.pending{
    color:orange;
    font-weight:bold;
}

.approved{
    color:green;
    font-weight:bold;
}

.rejected{
    color:red;
    font-weight:bold;
}

button{
    padding:6px 10px;
    margin:2px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.approveBtn{
    background:green;
    color:white;
}

.rejectBtn{
    background:red;
    color:white;
}

.viewBtn{
    background:#3498db;
    color:white;
}
</style>
</head>

<body>

<h1>HR Onboarding Dashboard</h1>

<table id="employeeTable">
<thead>
<tr>
<th>Employee ID</th>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Role</th>
<th>Manager</th>
<th>Joining Date</th>
<th>Documents</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>
</table>

<script>

// ✅ FIXED YOUR API URLs
const GET_API = "https://2ugyiqqxof.execute-api.ap-south-1.amazonaws.com/prod/employees";
const ACTION_API = "https://2ugyiqqxof.execute-api.ap-south-1.amazonaws.com/prod/approveEmployee";

// LOAD EMPLOYEES
async function loadEmployees(){

try{

const response = await fetch(GET_API);
const employees = await response.json();

const tableBody = document.querySelector("#employeeTable tbody");
tableBody.innerHTML = "";

employees.forEach(emp => {

let statusClass = "pending";

if(emp.status === "APPROVED" || emp.status === "ACTIVE") statusClass="approved";
if(emp.status === "REJECTED") statusClass="rejected";


// ✅ DOCUMENT LOGIC (ONLY SHOW IF UPLOADED)
let docLink = "No Docs";

if(emp.documents_uploaded === true){

docLink = `
<a href="https://hrms-documents-s2mb.s3.ap-south-1.amazonaws.com/employee-documents/${emp.employee_id}/id_proof.pdf" target="_blank">
    <button class="viewBtn">ID</button>
</a>

<a href="https://hrms-documents-s2mb.s3.ap-south-1.amazonaws.com/employee-documents/${emp.employee_id}/degree_certificate.pdf" target="_blank">
    <button class="viewBtn">Degree</button>
</a>

<a href="https://hrms-documents-s2mb.s3.ap-south-1.amazonaws.com/employee-documents/${emp.employee_id}/offer_letter.pdf" target="_blank">
    <button class="viewBtn">Offer</button>
</a>
`;
}


// ✅ ACTION BUTTONS
let actionButtons = "";

if(emp.status === "PENDING"){
    actionButtons = `
        <button class="approveBtn" onclick="updateStatus('${emp.employee_id}','APPROVED')">Approve</button>
        <button class="rejectBtn" onclick="updateStatus('${emp.employee_id}','REJECTED')">Reject</button>
    `;
}else{
    actionButtons = "-";
}


// ✅ ROW
let row = `
<tr>
<td>${emp.employee_id || "-"}</td>
<td>${emp.name || "-"}</td>
<td>${emp.email || "-"}</td>
<td>${emp.department || "-"}</td>
<td>${emp.role || "-"}</td>
<td>${emp.manager || "-"}</td>
<td>${emp.joining_date || "-"}</td>

<td>${docLink}</td>

<td class="${statusClass}">
${emp.status || "PENDING"}
</td>

<td>${actionButtons}</td>
</tr>
`;

tableBody.innerHTML += row;

});

}catch(error){

console.error("Error loading employees:", error);
alert("Failed to load employee data");

}

}


// UPDATE STATUS
async function updateStatus(empId, status){

if(!confirm(`Are you sure to ${status} this employee?`)) return;

try{

const response = await fetch(ACTION_API, {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        employee_id: empId,
        status: status
    })
});

const result = await response.json();

alert(result.message || "Updated successfully");

// reload table
loadEmployees();

}catch(error){

console.error("Error updating status:", error);
alert("Failed to update status");

}

}


// LOAD ON START
window.onload = loadEmployees;

</script>

</body>
</html>
